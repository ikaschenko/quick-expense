# fly.toml app configuration file generated for q-expense on 2026-03-17T14:59:08+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'q-expense-app'
primary_region = 'fra'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3001'

[[mounts]]
  source = 'app_data'
  destination = '/app/config'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
